<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Kavishka.AI | Advanced Neural Visualizer</title>
    
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel for JSX compilation -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        @keyframes flow {
            from { stroke-dashoffset: 20; }
            to { stroke-dashoffset: 0; }
        }
        .line-flow {
            stroke-dasharray: 5;
            animation: flow 1s linear infinite;
        }
        body { background-color: #020617; min-height: 100vh; display: flex; flex-direction: column; }
        
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #1e293b; border-radius: 10px; }

        input[type=range] {
            -webkit-appearance: none;
            background: transparent;
        }
        input[type=range]::-webkit-slider-runnable-track {
            width: 100%;
            height: 6px;
            background: #1e293b;
            border-radius: 3px;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 20px;
            width: 20px;
            border-radius: 50%;
            background: #22d3ee;
            cursor: pointer;
            margin-top: -7px;
            box-shadow: 0 0 15px rgba(34, 211, 238, 0.5);
        }
        .glass {
            background: rgba(15, 23, 42, 0.7);
            backdrop-filter: blur(16px);
            border: 1px solid rgba(255, 255, 255, 0.05);
        }
        
        .graph-container {
            position: relative;
            width: 100%;
            max-width: 800px;
            aspect-ratio: 4 / 3;
            margin: 0 auto;
        }
    </style>
</head>
<body class="text-slate-200">
    <div id="root"></div>

    <script type="text/babel">
        const Play = () => <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polygon points="5 3 19 12 5 21 5 3"/></svg>;
        const RotateCcw = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/></svg>;
        const ArrowRight = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M5 12h14"/><path d="m12 5 7 7-7 7"/></svg>;
        const ArrowLeft = ({size=20}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M19 12H5"/><path d="m12 19-7-7 7-7"/></svg>;
        const Zap = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><path d="M13 2 3 14h9l-1 8 10-12h-9l1-8z"/></svg>;
        const CodeIcon = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round"><polyline points="16 18 22 12 16 6"/><polyline points="8 6 2 12 8 18"/></svg>;
        const Mail = ({size=18}) => <svg width={size} height={size} viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m22 7-8.97 5.7a1.94 1.94 0 0 1-2.06 0L2 7"/><rect width="20" height="16" x="2" y="4" rx="2"/></svg>;

        const MicrogradSimulation = () => {
            const [step, setStep] = React.useState(0);
            const [animatingNode, setAnimatingNode] = React.useState(null);
            const [tanhInput, setTanhInput] = React.useState(0.8);
            const [windowWidth, setWindowWidth] = React.useState(window.innerWidth);

            React.useEffect(() => {
                const handleResize = () => setWindowWidth(window.innerWidth);
                window.addEventListener('resize', handleResize);
                return () => window.removeEventListener('resize', handleResize);
            }, []);

            const initialNodes = {
                x1: { id: 'x1', label: 'x1', data: 2.0, grad: 0, x: 20, y: 40 },
                w1: { id: 'w1', label: 'w1', data: -3.0, grad: 0, x: 20, y: 130 },
                x2: { id: 'x2', label: 'x2', data: 0.0, grad: 0, x: 20, y: 250 },
                w2: { id: 'w2', label: 'w2', data: 1.0, grad: 0, x: 20, y: 340 },
                b:  { id: 'b',  label: 'b',  data: 6.881, grad: 0, x: 280, y: 420 },
                m1: { id: 'm1', label: 'x1*w1', op: '*', inputs: ['x1', 'w1'], data: null, grad: 0, x: 160, y: 85 },
                m2: { id: 'm2', label: 'x2*w2', op: '*', inputs: ['x2', 'w2'], data: null, grad: 0, x: 160, y: 295 },
                s1: { id: 's1', label: 'sum', op: '+', inputs: ['m1', 'm2'], data: null, grad: 0, x: 300, y: 190 },
                n:  { id: 'n',  label: 'n',   op: '+', inputs: ['s1', 'b'],  data: null, grad: 0, x: 440, y: 190 },
                o:  { id: 'o',  label: 'o',   op: 'tanh', inputs: ['n'],     data: null, grad: 0, x: 580, y: 190 },
            };

            const [graph, setGraph] = React.useState(initialNodes);

            const steps = [
                { title: "1. Structure", icon: <CodeIcon />, desc: "The computational graph for n = (x1*w1 + x2*w2) + b." },
                { title: "2. Forward", icon: <Play />, desc: "Calculating raw results layer by layer. Zeroes are now correctly calculated and displayed." },
                { title: "3. Tanh", icon: <Zap />, desc: "Applying the activation function. Notice how it squashes the signal n." },
                { title: "4. Topology", icon: <ArrowRight />, desc: "Sorting nodes by dependency to enable a correct backward pass." },
                { title: "5. Backward", icon: <ArrowLeft />, desc: "Tracing gradients back to source using the Chain Rule logic." },
                { title: "6. Accumulate", icon: <Zap />, desc: "Using += to combine multiple influences into the final gradient." }
            ];

            const triggerLogic = async (targetStep) => {
                if (targetStep === 1) { 
                    const topo = ['m1', 'm2', 's1', 'n', 'o'];
                    for (let id of topo) {
                        setAnimatingNode(id);
                        await new Promise(r => setTimeout(r, 600));
                        setGraph(prev => {
                            const node = prev[id];
                            let val = 0;
                            if (node.op === '*') val = prev[node.inputs[0]].data * prev[node.inputs[1]].data;
                            if (node.op === '+') val = prev[node.inputs[0]].data + prev[node.inputs[1]].data;
                            if (node.op === 'tanh') val = Math.tanh(prev[node.inputs[0]].data);
                            return { ...prev, [id]: { ...node, data: val } };
                        });
                    }
                }
                if (targetStep === 4) { 
                    const revTopo = ['o', 'n', 's1', 'b', 'm2', 'm1', 'w2', 'x2', 'w1', 'x1'];
                    setGraph(prev => ({...prev, o: {...prev.o, grad: 1.0}}));
                    for (let id of revTopo) {
                        setAnimatingNode(id);
                        await new Promise(r => setTimeout(r, 700));
                        setGraph(prev => {
                            const current = prev[id];
                            if (!current.inputs) return prev;
                            const nextGraph = { ...prev };
                            current.inputs.forEach(inputId => {
                                let localDeriv = 1.0;
                                if (current.op === '*') {
                                    localDeriv = prev[current.inputs.find(i => i !== inputId)].data;
                                } else if (current.op === 'tanh') {
                                    localDeriv = 1 - (current.data ** 2);
                                }
                                nextGraph[inputId].grad += localDeriv * current.grad;
                            });
                            return nextGraph;
                        });
                    }
                }
                setAnimatingNode(null);
            };

            const handleNext = () => {
                if (step < steps.length - 1) {
                    const nextStep = step + 1;
                    setStep(nextStep);
                    triggerLogic(nextStep);
                }
            };

            const exp2x = Math.exp(2 * tanhInput);
            const currentTanhVal = (exp2x - 1) / (exp2x + 1);

            return (
                <div className="flex-1 flex flex-col h-full overflow-y-auto custom-scrollbar">
                    {/* Header Banner */}
                    <div className="flex-none glass border-b border-slate-800 px-4 sm:px-8 py-4 flex flex-col sm:flex-row items-center justify-between gap-4 sticky top-0 z-50">
                        <div className="flex items-center gap-4 sm:gap-8 w-full sm:w-auto">
                            <div className="flex flex-col">
                                <h1 className="text-xl sm:text-2xl font-black bg-clip-text text-transparent bg-gradient-to-r from-cyan-400 to-pink-500 tracking-tighter uppercase italic leading-none">Kavishka.AI</h1>
                                <span className="text-[9px] font-bold text-slate-500 tracking-widest uppercase mt-1">Neural Engine v7.0</span>
                            </div>
                            <div className="hidden md:block h-10 w-px bg-slate-800" />
                            <div className="flex items-center gap-3">
                                <div className="p-2.5 bg-cyan-500/10 rounded-xl border border-cyan-500/20 text-cyan-400">
                                    {steps[step].icon}
                                </div>
                                <div className="max-w-[150px] sm:max-w-none">
                                    <h2 className="text-sm font-black text-white uppercase leading-none">{steps[step].title}</h2>
                                    <p className="text-slate-500 text-[10px] sm:text-xs mt-1 line-clamp-1 sm:line-clamp-none">{steps[step].desc}</p>
                                </div>
                            </div>
                        </div>
                        <div className="flex items-center justify-between sm:justify-end gap-2 w-full sm:w-auto">
                            <div className="flex items-center gap-1 bg-slate-950 p-1 rounded-xl border border-slate-800">
                                <button disabled={step === 0} onClick={() => setStep(s => s - 1)} className="p-2 hover:bg-slate-800 rounded-lg disabled:opacity-20"><ArrowLeft size={16}/></button>
                                <span className="text-[9px] font-black px-2 text-slate-600 uppercase">Step {step + 1}</span>
                                <button disabled={step === steps.length - 1} onClick={handleNext} className="p-2 text-cyan-400 hover:bg-cyan-900/40 rounded-lg disabled:opacity-20"><ArrowRight size={16}/></button>
                            </div>
                            <button onClick={() => { setGraph(initialNodes); setStep(0); }} className="p-3 sm:px-5 sm:py-2.5 bg-slate-900 text-[9px] font-black uppercase rounded-xl border border-slate-800 flex items-center gap-2">
                                <RotateCcw /> <span className="hidden sm:inline">Reset</span>
                            </button>
                        </div>
                    </div>

                    <div className="flex-1 flex flex-col lg:flex-row overflow-hidden">
                        {/* Canvas Area */}
                        <div className="flex-1 relative bg-[#020617] p-4 sm:p-8 flex items-center justify-center overflow-hidden">
                            <div className="graph-container">
                                <svg viewBox="0 0 800 500" className="absolute inset-0 w-full h-full pointer-events-none">
                                    {Object.values(graph).map(node => node.inputs?.map(inp => (
                                        <line key={`${inp}-${node.id}`} 
                                              x1={graph[inp].x + 112} y1={graph[inp].y + 40} 
                                              x2={node.x} y2={node.y + 40} 
                                              stroke={animatingNode === node.id ? '#22d3ee' : '#1e293b'} 
                                              strokeWidth={animatingNode === node.id ? "4" : "2"} 
                                              className="transition-all duration-300" />
                                    )))}
                                </svg>
                                {Object.values(graph).map(node => (
                                    <div key={node.id} 
                                         className={`absolute w-28 h-20 bg-slate-900 border-2 rounded-2xl flex flex-col items-center justify-center transition-all duration-300 shadow-xl
                                            ${animatingNode === node.id ? 'border-cyan-400 scale-110 z-10' : 'border-slate-800'}
                                            ${node.grad !== 0 ? 'border-pink-500/30' : ''}`}
                                         style={{ left: `${(node.x / 800) * 100}%`, top: `${(node.y / 500) * 100}%` }}>
                                        <div className="text-[8px] text-slate-500 uppercase font-black absolute -top-4 left-0">{node.label}</div>
                                        <div className="text-[12px] sm:text-sm font-mono font-bold text-white">
                                            {node.data === null ? '?' : node.data.toFixed(3)}
                                        </div>
                                        <div className={`text-[9px] sm:text-[10px] font-bold mt-1 ${node.grad !== 0 ? 'text-pink-500 animate-pulse' : 'text-slate-700'}`}>
                                            ∇: {node.grad.toFixed(3)}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>

                        {/* Sidebar */}
                        <div className="w-full lg:w-[450px] border-t lg:border-t-0 lg:border-l border-slate-800 glass p-6 sm:p-8 flex flex-col gap-6 overflow-y-auto custom-scrollbar">
                            
                            {/* Tanh Visual */}
                            <div className="bg-slate-950/80 rounded-[2rem] p-6 border border-slate-800 shadow-xl">
                                <h3 className="text-[9px] font-black uppercase tracking-[0.2em] text-slate-500 mb-4">Activation Logic</h3>
                                <div className="bg-black/40 p-4 rounded-2xl border border-slate-800 text-center mb-6">
                                    <div className="text-cyan-400 font-mono text-[11px] leading-relaxed">
                                        tanh(x) = (e<sup>2x</sup> - 1) / (e<sup>2x</sup> + 1)
                                    </div>
                                </div>
                                <input type="range" min="-3" max="3" step="0.1" value={tanhInput} onChange={e => setTanhInput(parseFloat(e.target.value))} className="w-full h-3 mb-2" />
                                <div className="flex justify-between text-[10px] font-mono text-slate-500">
                                    <span>Input: {tanhInput.toFixed(2)}</span>
                                    <span className="text-cyan-400 font-black">Output: {currentTanhVal.toFixed(3)}</span>
                                </div>
                            </div>

                            {/* Full Engine Code Panel */}
                            <div className="bg-slate-950/80 rounded-[2rem] p-6 border border-slate-800 flex-1 min-h-[400px]">
                                <h3 className="text-[9px] font-black uppercase tracking-widest text-slate-500 mb-5 flex items-center gap-2"><CodeIcon size={12}/> Python Engine Library</h3>
                                
                                <div className="space-y-4">
                                    {/* ADDITION */}
                                    <div className={`p-4 rounded-2xl border transition-all duration-300 ${animatingNode && (graph[animatingNode].op === '+') ? 'bg-indigo-500/20 border-indigo-400 shadow-[0_0_15px_rgba(129,140,248,0.2)]' : 'bg-black/40 border-slate-800 opacity-70'}`}>
                                        <div className="text-[9px] text-indigo-400 font-black mb-2 uppercase tracking-tighter">__add__(self, other)</div>
                                        <pre className="text-[9px] text-indigo-200 overflow-x-auto leading-relaxed">
{`def __add__(self, other):
  out = Value(self.data + other.data, (self, other), '+')
  def _backward():
    self.grad += 1.0 * out.grad
    other.grad += 1.0 * out.grad
  out._backward = _backward
  return out`}
                                        </pre>
                                    </div>

                                    {/* MULTIPLICATION */}
                                    <div className={`p-4 rounded-2xl border transition-all duration-300 ${animatingNode && graph[animatingNode].op === '*' ? 'bg-cyan-500/20 border-cyan-400 shadow-[0_0_15px_rgba(34,211,238,0.2)]' : 'bg-black/40 border-slate-800 opacity-70'}`}>
                                        <div className="text-[9px] text-cyan-400 font-black mb-2 uppercase tracking-tighter">__mul__(self, other)</div>
                                        <pre className="text-[9px] text-cyan-200 overflow-x-auto leading-relaxed">
{`def __mul__(self, other):
  out = Value(self.data * other.data, (self, other), '*')
  def _backward():
    self.grad += other.data * out.grad
    other.grad += self.data * out.grad
  out._backward = _backward
  return out`}
                                        </pre>
                                    </div>

                                    {/* TANH */}
                                    <div className={`p-4 rounded-2xl border transition-all duration-300 ${animatingNode === 'o' ? 'bg-pink-500/20 border-pink-400 shadow-[0_0_15px_rgba(244,114,182,0.2)]' : 'bg-black/40 border-slate-800 opacity-70'}`}>
                                        <div className="text-[9px] text-pink-400 font-black mb-2 uppercase tracking-tighter">tanh(self)</div>
                                        <pre className="text-[9px] text-pink-200 overflow-x-auto leading-relaxed">
{`def tanh(self):
  t = math.tanh(self.data)
  out = Value(t, (self, ), 'tanh')
  def _backward():
    self.grad += (1 - t**2) * out.grad
  out._backward = _backward
  return out`}
                                        </pre>
                                    </div>
                                </div>
                            </div>

                            {/* Branding Footer */}
                            <div className="mt-auto pt-6 border-t border-slate-800 flex flex-col gap-4">
                                <div className="flex items-center justify-between">
                                    <span className="text-[11px] font-black text-slate-400 tracking-tighter italic">Kavishka.AI</span>
                                    <div className="flex items-center gap-2">
                                        <div className={`w-2 h-2 rounded-full ${animatingNode ? 'bg-green-500 animate-pulse' : 'bg-slate-700'}`} />
                                        <span className="text-[9px] font-bold text-slate-500 uppercase">{animatingNode ? 'Active Trace' : 'Idle'}</span>
                                    </div>
                                </div>
                                <a href="mailto:linkinkavi@gmail.com" className="flex items-center gap-3 p-4 bg-slate-950/80 rounded-2xl border border-slate-800 hover:border-cyan-500 hover:shadow-[0_0_15px_rgba(34,211,238,0.1)] transition-all">
                                    <div className="text-cyan-400"><Mail size={16} /></div>
                                    <span className="text-[10px] font-bold text-slate-400">linkinkavi@gmail.com</span>
                                </a>
                            </div>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<MicrogradSimulation />);
    </script>
</body>
</html>
